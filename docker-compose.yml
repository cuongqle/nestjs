version: '3.8'

services:
  app:
    build: .
    container_name: nest_app
    ports:
      - '3000:3000'
    depends_on:
      - mysql
      - redis
    environment:
      NODE_ENV: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: poc_db
      REDIS_HOST: redis
      REDIS_PORT: 6379

  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: poc_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - '6379:6379'

volumes:
  mysql_data: